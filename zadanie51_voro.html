    <script language="JavaScript"> 
  do {
    silnia_koniec=parseFloat (prompt("z czego silnia",""));
  }
    while(silnia_koniec<0);
      if(silnia_koniec==0) {silnia_vor=1;}
        else
      {var silnia_vor=1;

         silnia_vor=silnia_vor*1;
       }
      }
      document.write(silnia_koniec+"!="+silnia_vor);
                  </script>
