<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Zadanie 59</title>
</head>
<body>

<pre id="wynik"></pre>

<script>
let start = 25;
let end = 40;

let wynik = document.getElementById("wynik");

for (let i = start; i <= end; i++) {
    let pierw2 = Math.sqrt(i);
    let pierw4 = Math.sqrt(pierw2);

    wynik.textContent +=
        "I=" + i +
        " pierw_2(" + i + ")=" + pierw2.toFixed(2) +
        " pierw_4(" + i + ")=" + pierw4.toFixed(2) + "\n";
}
</script>

</body>
</html>
