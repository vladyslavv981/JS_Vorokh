<!DOCTYPE html>

<meta charset="UTF-8">

</head>
<body>

<script>
var imie = prompt("Podaj imię:");
var nazwisko = prompt("Podaj nazwisko:");

var a_vor = (nazwisko.length % 4) + 5;
var b_vor = (imie.length % 6) + 20;

for (var i = 1; i <= b_vor; i++) {
    document.write("*");
}
document.write("<br>");

for (var i = 1; i <= (a_vor - 2); i++) {
    document.write("*");
    for (var j = 1; j <= (b_vor - 2); j++) {
        document.write("&nbsp&nbsp");
    }
    document.write("*<br>");
}

for (var i = 1; i <= b_vor; i++) {
    document.write("*");
}
document.write("<br>");
</script>
