<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Zadanie 56</title>
</head>
<body>
<script>
var imie = prompt("Podaj imię:");
var nazwisko = prompt("Podaj nazwisko:");

var a = (nazwisko.length % 4) + 5;
var b = (imie.length % 6) + 20;

for (var i = 0; i < b; i++) {
    document.write("*");
}
document.write("<br>");
var wiersz = "*";
for (var i = 1; i < (b - 2); i++) {
    wiersz = wiersz + "&nbsp;&nbsp;";
}
wiersz = wiersz + "*";
for (var i = 0; i < (a - 2); i++) {
    document.write(wiersz);
    document.write("<br>");
}
for (var i = 0; i < b; i++) {
    document.write("*");
}
</script>

</body>
</html>
