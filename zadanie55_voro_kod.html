<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Zadanie 55</title>
</head>
<body>
<script>
let a_kow = parseInt(prompt("Podaj a:"));
let b_kow = parseInt(prompt("Podaj b:"));

for (let i = 1; i <= b_kow; i++) {
    document.write("*");
}
document.write("<br>");

let wiersz_kow = "*";

for (let i = 1; i <= (b_kow - 2); i++) {
    wiersz_kow = wiersz_kow + "&nbsp&nbsp";
}

wiersz_kow = wiersz_kow + "*";

for (let i = 1; i <= (a_kow - 2); i++) {
    document.write(wiersz_kow + "<br>");
}

for (let i = 1; i <= b_kow; i++) {
    document.write("*");
}
</script>
</body>
