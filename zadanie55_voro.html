<body>
<script>

let a_vor = 6;
let b_vor = 20;

for (let i = 1; i <= b_vor; i++) {
    document.write("*");
}
document.write("<br>");

let wiersz_vor = "*";

for (let i = 1; i <= (b_vor - 2); i++) {
    wiersz_vor += " ";
}

wiersz_vor += "*";

for (let i = 1; i <= (a_vor - 2); i++) {
    document.write(wiersz_vor + "<br>");
}

for (let i = 1; i <= b_vor; i++) {
    document.write("*");
}

</script>
