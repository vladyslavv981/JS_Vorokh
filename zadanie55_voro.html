<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Zadanie 55</title>
</head>
<body>

<script>
var a_vor = parseInt(prompt("Podaj a (wysokość):"));
var b_vor = parseInt(prompt("Podaj b (szerokość):"));

for (var i = 1; i <= b_vor; i++) {
    document.write("*");
}
document.write("<br>");

var wiersz_vor = "*";
for (var i = 1; i <= (b_vor - 2); i++) {
    wiersz_vor = wiersz_vor + "&nbsp&nbsp";
}
wiersz_vor = wiersz_vor + "*";

for (var i = 1; i <= (a_vor - 2); i++) {
    document.write(wiersz_vor);
    document.write("<br>");
}

for (var i = 1; i <= b_vor; i++) {
    document.write("*");
}
document.write("<br>");
</script>

</body>
</html>
